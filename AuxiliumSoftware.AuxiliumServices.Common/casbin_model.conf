# Group-based access control, where groups have permissions on other groups.
# Everything is deny by default.
# No deny rules - only explicit allows.

##################################################
# REQUEST DEFINITION
#
# Defines the shape of an access request.
# sub = the user making the request (by their user ID)
# obj = the target group that the resource belongs to
# act = the action being performed (e.g. PolicyAction.Read)
##################################################
[request_definition]
r = sub, obj, act


##################################################
# POLICY DEFINITION
#
# Defines the shape of a policy rule stored in the database.
# sub = a group that is being granted permission
# obj = the target group being granted access to (supports wildcards)
# act = the action being granted (supports wildcards)
# e.g. group:internal-caseworkers, group:vets-nhs, PolicyAction.Read
##################################################
[policy_definition]
p = sub, obj, act


##################################################
# ROLE DEFINITION
# Defines group membership and group inheritance.
# g = _, _ means "this subject belongs to / inherits from this group"
# e.g. alice -> group:internal-caseworkers -> group:internal-staff
##################################################
[role_definition]
g = _, _


##################################################
# POLICY EFFECT
# A request is allowed if ANY matching policy says allow.
# We never use deny rules - access is purely additive.
##################################################
[policy_effect]
e = some(where (p.eft == allow))


##################################################
# MATCHERS
# How a request is evaluated against policies.
# g(r.sub, p.sub)        = the requesting user is a member of (or inherits from) the policy's subject group
# keyMatch(r.obj, p.obj) = the target group matches the policy's object (supports * wildcard)
# keyMatch(r.act, p.act) = the action matches the policy's action (supports * wildcard)
##################################################
[matchers]
m = g(r.sub, p.sub) && keyMatch(r.obj, p.obj) && keyMatch(r.act, p.act)
